# SemTero - MCP Server for Zotero
# Usage: docker-compose up -d

services:
  semtero:
    build:
      context: .
      dockerfile: Dockerfile
    image: semtero:latest
    ports:
      - "23120:23120"
      - "23121:23121"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      APP_HOST: 0.0.0.0
      WEBUI_HOST: 0.0.0.0
      ZOTERO_API_URL: ${ZOTERO_API_URL:-http://host.docker.internal:23119}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      VECTOR_STORE_DIR: /app/data/vector_store
      PDF_CACHE_PATH: /app/data/pdfs
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      NOISY_LOG_LEVEL: ${NOISY_LOG_LEVEL:-WARNING}
      AUTO_REEMBED_INTERVAL_MINUTES: ${AUTO_REEMBED_INTERVAL_MINUTES:-15}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

# If your Docker installation cannot reach host.docker.internal on Linux,
# an alternative is to run the container with host networking instead.
# That looks like:
#   network_mode: host
# and then you should remove the `ports:` section above.
